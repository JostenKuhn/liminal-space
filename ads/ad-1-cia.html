<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
  .ad {
    width: 1080px; height: 1080px;
    background: #050510;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
    overflow: hidden;
  }
  /* Subtle radial glow */
  .ad::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; height: 900px;
    background: radial-gradient(circle, rgba(107,92,231,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Top line accent */
  .accent-line {
    width: 60px; height: 2px;
    background: #D4A84C;
    margin-bottom: 48px;
    position: relative; z-index: 1;
  }
  .eyebrow {
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #D4A84C;
    margin-bottom: 40px;
    position: relative; z-index: 1;
  }
  .headline {
    font-family: 'Syne', sans-serif;
    font-size: 64px;
    font-weight: 700;
    color: #F0EEF8;
    line-height: 1.15;
    margin-bottom: 32px;
    position: relative; z-index: 1;
    max-width: 800px;
  }
  .headline em {
    font-style: normal;
    color: #D4A84C;
  }
  .subtext {
    font-family: 'Newsreader', Georgia, serif;
    font-size: 24px;
    font-weight: 300;
    font-style: italic;
    color: #B8B4CE;
    line-height: 1.6;
    margin-bottom: 56px;
    max-width: 600px;
    position: relative; z-index: 1;
  }
  .cta {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    padding: 20px 48px;
    background: #D4A84C;
    color: #050510;
    border-radius: 8px;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 30px rgba(212,168,76,0.3);
    position: relative; z-index: 1;
  }
  .note {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: #7E7A94;
    margin-top: 20px;
    position: relative; z-index: 1;
  }
  /* Stars */
  .star { position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.4); border-radius: 50%; }
</style>
</head>
<body>
<div class="ad">
  <!-- Scattered stars -->
  <div class="star" style="top:8%;left:12%"></div>
  <div class="star" style="top:15%;left:78%"></div>
  <div class="star" style="top:22%;left:45%"></div>
  <div class="star" style="top:35%;left:88%"></div>
  <div class="star" style="top:55%;left:8%"></div>
  <div class="star" style="top:70%;left:92%"></div>
  <div class="star" style="top:82%;left:25%"></div>
  <div class="star" style="top:90%;left:65%"></div>
  <div class="star" style="top:5%;left:55%;width:3px;height:3px;opacity:0.6"></div>
  <div class="star" style="top:45%;left:95%;width:3px;height:3px;opacity:0.5"></div>
  <div class="star" style="top:75%;left:15%;width:3px;height:3px;opacity:0.5"></div>

  <div class="accent-line"></div>
  <p class="eyebrow">Declassified</p>
  <h1 class="headline">The CIA spent 23 years proving your mind can <em>leave your body</em></h1>
  <p class="subtext">Now it's a free 20-minute audio session away.</p>
  <div class="cta">Get Free Access</div>
  <p class="note">No credit card · Instant access · Headphones required</p>
</div>
</body>
</html>
