<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; }
  .ad {
    width: 1080px; height: 1080px;
    background: #050510;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px;
    text-align: center;
    overflow: hidden;
  }
  .ad::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 1000px; height: 1000px;
    background: radial-gradient(circle, rgba(107,92,231,0.06) 0%, transparent 60%);
  }
  .big-text {
    font-family: 'Syne', sans-serif;
    font-size: 96px;
    font-weight: 800;
    color: #F0EEF8;
    line-height: 1.05;
    margin-bottom: 48px;
    position: relative; z-index: 1;
  }
  .big-text .dim {
    color: #7E7A94;
  }
  .divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, #D4A84C, transparent);
    margin-bottom: 48px;
    position: relative; z-index: 1;
  }
  .proof {
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 300;
    color: #B8B4CE;
    line-height: 1.7;
    margin-bottom: 48px;
    max-width: 600px;
    position: relative; z-index: 1;
  }
  .proof strong {
    color: #D4A84C;
    font-weight: 500;
  }
  .cta {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    padding: 20px 56px;
    background: #D4A84C;
    color: #050510;
    border-radius: 8px;
    box-shadow: 0 4px 30px rgba(212,168,76,0.3);
    position: relative; z-index: 1;
  }
  .note {
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: #7E7A94;
    margin-top: 20px;
    position: relative; z-index: 1;
  }
</style>
</head>
<body>
<div class="ad">
  <h1 class="big-text">You are<br><span class="dim">not</span><br>your body.</h1>
  <div class="divider"></div>
  <p class="proof">The Monroe Institute has been proving this since 1971.<br><strong>Try their technique free.</strong></p>
  <div class="cta">Free Audio Session</div>
  <p class="note">20 min · Headphones · No credit card</p>
</div>
</body>
</html>
